<svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop stopColor="#07111F" />
      <stop offset="1" stopColor="#0B1A30" />
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop stopColor="#2B80F0" />
      <stop offset="1" stopColor="#5FA8FF" />
    </linearGradient>
    <linearGradient id="letter" x1="18" y1="28" x2="78" y2="72" gradientUnits="userSpaceOnUse">
      <stop stopColor="#5FA8FF" />
      <stop offset="0.5" stopColor="#2B80F0" />
      <stop offset="1" stopColor="#1A6BD6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect x="2" y="2" width="96" height="96" rx="22" ry="22" fill="url(#bg)" stroke="url(#ring)" strokeWidth="3" />
  <!-- M letterform -->
  <path
    d="M18 72 L18 30 L50 62 L82 30 L82 72"
    stroke="url(#letter)"
    strokeWidth="9"
    strokeLinecap="round"
    strokeLinejoin="round"
    fill="none"
    filter="url(#glow)"
  />
</svg>
